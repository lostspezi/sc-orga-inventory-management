services:
  maildev:
    image: maildev/maildev:latest
    container_name: sc-orga-maildev
    ports:
      - "1025:1025" # SMTP port (your app sends here)
      - "1080:1080" # Web UI (view emails in browser)
    environment:
      MAILDEV_INCOMING_USER: ""
      MAILDEV_INCOMING_PASS: ""
    restart: unless-stopped
